replicaCount: 8
image:
  repository: willom2c/traffico-api
  pullPolicy: IfNotPresent
  tag: "sha-3e3cce459f99d30047bfbf8b852259dc70634d2a"
service:
  type: ClusterIP
  port: 3000
serviceMonitor:
  enabled: true
  labels:
    release: kube-prometheus-stack
  path: /metrics
  port: http
  interval: 15s
resources:
  requests:
    cpu: 900m
    memory: 512Mi
nodeSelector: {}
tolerations: []
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: NotIn
              values:
                - hash-n97-1
topologySpread:
  enabled: true
  maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: DoNotSchedule
  matchLabelKeys:
    - pod-template-hash

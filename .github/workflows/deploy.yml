name: Deploy

on:
  workflow_run:
    workflows: ["Docker Publish"]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      sha:
        description: '배포할 커밋 SHA (생략 시 master의 최신 커밋)'
        required: false
        default: ''

concurrency:
  group: deploy-${{ github.workflow }}
  cancel-in-progress: false

env:
  IMAGE_NAME: traffico-api
  BOT_NAME: "traffico-deploy[bot]"
  BOT_EMAIL: "traffico-deploy[bot]@bot.com"

jobs:
  update-helm:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        github.event.workflow_run.conclusion == 'success'
      }}
    runs-on: [self-hosted, traffico]
    steps:
      - name: Determine commit SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHA="${{ inputs.sha }}"
            [ -z "$SHA" ] && SHA="${{ github.sha }}"
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
          fi

          if [ -z "$SHA" ]; then
            echo "::error::Commit SHA를 결정할 수 없습니다"
            exit 1
          fi

          echo "value=$SHA" >> "$GITHUB_OUTPUT"
          echo "Deploying SHA: $SHA"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GIT_HUB_HASH_PAT }}

      - name: Update image tag in values.yaml
        uses: mikefarah/yq@v4
        with:
          cmd: |
            yq eval -i '
              .image.tag = "sha-${{ steps.sha.outputs.value }}"
            ' ./deploy/helm/${{ env.IMAGE_NAME }}/values.yaml

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            🤖 ci(deploy): update ${{ env.IMAGE_NAME }} image tag

            - Application: ${{ env.IMAGE_NAME }}
            - New Tag: sha-${{ steps.sha.outputs.value }}
            - Workflow: ${{ github.workflow }}
            - Triggered by: ${{ github.actor }}
            - Build URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - Source Commit: ${{ github.server_url }}/${{ github.repository }}/commit/${{ steps.sha.outputs.value }}

            Auto-generated by GitHub Actions
          branch: master
          file_pattern: "deploy/helm/${{ env.IMAGE_NAME }}/values.yaml"
          commit_user_name: ${{ env.BOT_NAME }}
          commit_user_email: ${{ env.BOT_EMAIL }}

name: Docker Publish
on:
  push:
    branches:
      - master
    paths-ignore:
      - 'deploy/**'
  workflow_dispatch:

env:
  IMAGE_NAME: traffico-api

jobs:
  build:
    runs-on: [self-hosted, traffico]
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_HASH_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_HASH_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: willom2c/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Clean up old local images (keep last 10)
        if: always()
        run: |
          IMAGE=willom2c/${{ env.IMAGE_NAME }}
          
          OLD_IMAGES=$(docker images "${IMAGE}" --format "{{.ID}} {{.CreatedAt}}" | sort -k2 | head -n -10 | awk '{print $1}')
          
          if [ -n "$OLD_IMAGES" ]; then
            echo "$OLD_IMAGES" | xargs -r docker rmi -f || true
          fi

      - name: Clean up dangling images
        if: success()
        run: |
          docker image prune -f